[build]
  command = "npm run build:netlify"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.12.0"
  API_BASE_URL = "https://securelocker1.netlify.app"
  FRONTEND_URL = "https://securelocker1.netlify.app"
  CORS_ORIGIN = "https://securelocker1.netlify.app"
  VITE_API_BASE_URL = "https://securelocker1.netlify.app/api"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api/health"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
